services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: huatai_employee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5480:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3088:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/huatai_employee
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
